services:
  kanban:
    build: .
    ports:
      - "3000:3000"
    environment:
      BRIDGE_API_URL: http://bridge:8080
      BRIDGE_API_KEY: ${BRIDGE_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      DB_PATH: /data/kanban.db
    volumes:
      - kanban-data:/data
    depends_on:
      bridge:
        condition: service_started
    restart: unless-stopped

  bridge:
    image: copilot-bridge:latest
    ports:
      - "8080:8080"

volumes:
  kanban-data:
